name: Scheduled Release

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Check, build & release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GH_PAT }}

      - name: Verify release signing secrets are configured
        run: |
          MISSING=""
          [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] && MISSING="$MISSING ANDROID_KEYSTORE_BASE64"
          [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] && MISSING="$MISSING ANDROID_KEYSTORE_PASSWORD"
          [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ] && MISSING="$MISSING ANDROID_KEY_ALIAS"
          [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ] && MISSING="$MISSING ANDROID_KEY_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required release-signing secrets:$MISSING"
            echo "::error::Configure GitHub Actions secrets before releasing (see BLD-485 / fdroid/release-cert.sha256)."
            exit 1
          fi
          if [ ! -f fdroid/release-cert.sha256 ]; then
            echo "::error::Expected cert fingerprint file fdroid/release-cert.sha256 is missing."
            exit 1
          fi
          echo "All release-signing secrets present."

      - name: Get latest tag
        id: latest_tag
        run: |
          TAG=$(git tag --sort=-v:refname | grep '^v' | head -1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $TAG"

      - name: Check for new commits since last tag
        id: check_commits
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "No existing tags — will create initial release"
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            echo "commit_count=initial" >> "$GITHUB_OUTPUT"
          else
            COUNT=$(git rev-list "$TAG"..HEAD --count)
            echo "Commits since $TAG: $COUNT"
            echo "commit_count=$COUNT" >> "$GITHUB_OUTPUT"
            if [ "$COUNT" -gt 0 ]; then
              echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_new_commits=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Exit if no new commits
        if: steps.check_commits.outputs.has_new_commits != 'true'
        run: |
          echo "No new commits since ${{ steps.latest_tag.outputs.tag }}. Skipping release."
          exit 0

      - name: Compute next version
        if: steps.check_commits.outputs.has_new_commits == 'true'
        id: next_version
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"
          if [ -z "$TAG" ]; then
            NEXT="0.1.0"
          else
            VERSION="${TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEXT="$MAJOR.$MINOR.$PATCH"
            # Skip past any tags that already exist (e.g. created manually)
            while git tag -l "v$NEXT" | grep -q .; do
              echo "Tag v$NEXT already exists, incrementing..."
              PATCH=$((PATCH + 1))
              NEXT="$MAJOR.$MINOR.$PATCH"
            done
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Compute next version code
        if: steps.check_commits.outputs.has_new_commits == 'true'
        id: next_vcode
        run: |
          CURRENT=$(grep 'CurrentVersionCode:' fdroid/metadata/com.persoack.cablesnap.yml | awk '{print $2}')
          NEXT=$((CURRENT + 1))
          echo "version_code=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version code: $NEXT"

      - name: Bump version in package.json
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: |
          VERSION="${{ steps.next_version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Bump version in app.config.ts
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: |
          VERSION="${{ steps.next_version.outputs.version }}"
          VCODE="${{ steps.next_vcode.outputs.version_code }}"
          sed -i "s/version: \"[^\"]*\"/version: \"$VERSION\"/" app.config.ts
          sed -i "s/versionCode: [0-9]*/versionCode: $VCODE/" app.config.ts

      - name: Bump version in F-Droid metadata
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: |
          VERSION="${{ steps.next_version.outputs.version }}"
          VCODE="${{ steps.next_vcode.outputs.version_code }}"
          sed -i "s/CurrentVersion: .*/CurrentVersion: $VERSION/" fdroid/metadata/com.persoack.cablesnap.yml
          sed -i "s/CurrentVersionCode: .*/CurrentVersionCode: $VCODE/" fdroid/metadata/com.persoack.cablesnap.yml

      - name: Generate release notes
        if: steps.check_commits.outputs.has_new_commits == 'true'
        id: release_notes
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"
          VERSION="${{ steps.next_version.outputs.version }}"
          {
            echo 'notes<<NOTES_EOF'
            echo "## What's New"
            echo ""
            if [ -z "$TAG" ]; then
              git log --oneline | head -20
            else
              git log --oneline "$TAG"..HEAD
            fi
            echo ""
            echo "## Install"
            echo ""
            echo "Add the F-Droid repo URL to your F-Droid client:"
            echo '```'
            echo "https://alankyshum.github.io/cablesnap/repo"
            echo '```'
            echo ""
            echo "## Wear OS companion (Play Store only)"
            echo ""
            echo "The Wear OS companion APK (\`cablesnap-wear.apk\`) is distributed via the Play Store only — F-Droid's Inclusion Criteria reject the GMS Wearable dependency the watch app needs. The F-Droid build of CableSnap (\`cablesnap-fdroid.apk\`) is fully functional on its own; the watch APK is an optional companion."
            echo 'NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      # Dry-run mode: when dispatched from a non-main ref (e.g. a PR branch),
      # skip the "Commit and push" and "Create GitHub Release" steps. All other
      # steps — including keystore decode, assembleRelease, and apksigner
      # fingerprint verification — still run, so the signing path can be
      # exercised and independently verified before merge.
      - name: Commit and push
        if: steps.check_commits.outputs.has_new_commits == 'true' && github.ref == 'refs/heads/main'
        run: |
          VERSION="${{ steps.next_version.outputs.version }}"
          git config user.name "CableSnap Release Bot"
          git config user.email "release-bot@cablesnap.app"
          git add package.json app.config.ts fdroid/metadata/com.persoack.cablesnap.yml
          git commit -m "release: v$VERSION"
          git push origin main

      - name: Dry-run notice (non-main ref)
        if: steps.check_commits.outputs.has_new_commits == 'true' && github.ref != 'refs/heads/main'
        run: |
          echo "::notice::Dry-run mode — ref is ${{ github.ref }}, not refs/heads/main."
          echo "::notice::Skipping 'Commit and push' and 'Create GitHub Release'; signed APK will be uploaded as a workflow artifact for review."

      # --- Build APK BEFORE creating release (immutable releases block later uploads) ---

      - name: Set up JDK 17
        if: steps.check_commits.outputs.has_new_commits == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        if: steps.check_commits.outputs.has_new_commits == 'true'
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        if: steps.check_commits.outputs.has_new_commits == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: npm ci

      - name: Generate native project
        if: steps.check_commits.outputs.has_new_commits == 'true'
        env:
          # Sentry Expo config plugin reads these at prebuild time to generate
          # android/sentry.properties. Missing values are handled gracefully
          # (the plugin emits warning comments and falls back to env at build
          # time), so an unconfigured secret does NOT break the release.
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: npx expo prebuild --clean --platform android

      - name: Boost Gradle JVM heap
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: |
          # expo prebuild --clean regenerates android/gradle.properties with
          # org.gradle.jvmargs=-Xmx2048m, which is borderline for
          # assembleRelease: :app:mergeReleaseNativeDebugMetadata routinely
          # OOMs on the ubuntu-latest runner. Bump to 6g so the build can
          # finish and the apksigner fingerprint step can run.
          set -euo pipefail
          PROPS=android/gradle.properties
          if grep -q '^org.gradle.jvmargs=' "$PROPS"; then
            sed -i 's|^org.gradle.jvmargs=.*|org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m|' "$PROPS"
          else
            echo 'org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=1024m' >> "$PROPS"
          fi
          grep '^org.gradle.jvmargs=' "$PROPS"

      - name: Decode release keystore and write keystore.properties
        if: steps.check_commits.outputs.has_new_commits == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          if [ ! -s android/app/release.keystore ]; then
            echo "::error::Decoded release.keystore is empty — check ANDROID_KEYSTORE_BASE64 secret."
            exit 1
          fi
          cat > android/keystore.properties <<PROPS
          storeFile=release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          PROPS
          chmod 600 android/keystore.properties android/app/release.keystore
          echo "Wrote android/keystore.properties (storeFile=release.keystore, alias=$ANDROID_KEY_ALIAS)"

      - name: Build APK
        if: steps.check_commits.outputs.has_new_commits == 'true'
        env:
          # Sentry Android Gradle plugin reads these to upload debug symbols +
          # source maps during assembleRelease. Missing SENTRY_AUTH_TOKEN is
          # tolerated: the plugin logs a warning and ships an APK without
          # source maps rather than hard-failing the build.
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          # M0 (BLD-736) introduces a phone-app build-type split (pivoted from
          # productFlavors after CEO approval 2026-04-28; see plan addendum):
          #   - release       — Watch bridge + GMS Wearable wired in (Play).
          #   - releaseFdroid — initWith release; bridge + GMS excluded via
          #                     :app configurations excludes (F-Droid-safe).
          # The Wear OS standalone watch APK is also built here (Play-only).
          # See .plans/PLAN-BLD-716.md §"F-Droid + Play split" + §"Watch APK
          # distribution".
          set -euo pipefail
          cd android
          ./gradlew \
            :app:assembleRelease \
            :app:assembleReleaseFdroid \
            :wear:assembleRelease
          cd ..
          # Phone APK (Play / `release` build type) — the canonical
          # `cablesnap.apk` retained for the existing Play Store /
          # GitHub-Release pipeline.
          cp android/app/build/outputs/apk/release/app-release.apk cablesnap.apk
          # Phone APK (`releaseFdroid` build type) — what the F-Droid build
          # server's `Builds:` recipe also produces locally; we attach it as
          # a separate release asset so external mirrors can verify the
          # GMS-free build matches.
          cp android/app/build/outputs/apk/releaseFdroid/app-releaseFdroid.apk cablesnap-fdroid.apk
          # Watch APK — Wear OS 4 standalone artifact; Play-only (F-Droid
          # rejects GMS).
          cp android/wear/build/outputs/apk/release/wear-release.apk cablesnap-wear.apk
          echo "Built artifacts:"
          ls -lh cablesnap.apk cablesnap-fdroid.apk cablesnap-wear.apk

      - name: AC10b — verify F-Droid APK contains zero GMS Wearable classes
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: |
          # Plan AC10b: the F-Droid flavor APK MUST NOT carry any
          # com/google/android/gms/wearable/* classes. We verify by listing
          # the APK's classes.dex entries and grepping. If even one shows up,
          # fail the release — that means the with-wearos-module plugin's
          # configurations { releaseFdroidImplementation { exclude ... } }
          # block stopped working as expected.
          set -euo pipefail
          GMS_COUNT=$(unzip -l cablesnap-fdroid.apk \
            | grep -c 'com/google/android/gms/wearable' \
            || true)
          echo "GMS Wearable class hits in cablesnap-fdroid.apk: $GMS_COUNT"
          if [ "$GMS_COUNT" -ne 0 ]; then
            echo "::error::AC10b violated — cablesnap-fdroid.apk contains $GMS_COUNT GMS Wearable class entries."
            echo "::error::Inspect the APK with: unzip -l cablesnap-fdroid.apk | grep gms/wearable"
            exit 1
          fi
          echo "AC10b OK — F-Droid APK is GMS-Wearable-free."

      - name: Verify APK signature matches committed fingerprint
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: |
          set -euo pipefail
          BUILD_TOOLS_DIR=$(ls -d "$ANDROID_HOME"/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          if [ -z "$BUILD_TOOLS_DIR" ]; then
            echo "::error::No Android build-tools found under $ANDROID_HOME/build-tools."
            exit 1
          fi
          APKSIGNER="${BUILD_TOOLS_DIR}apksigner"
          echo "Using apksigner: $APKSIGNER"

          # Strict signature validity check first — fail fast on bad signing,
          # before we even look at the fingerprint.
          if ! "$APKSIGNER" verify cablesnap.apk; then
            echo "::error::apksigner verify reports the APK signature is INVALID."
            exit 1
          fi

          # Dump certs for inspection and fingerprint extraction.
          "$APKSIGNER" verify --print-certs cablesnap.apk | tee apksigner.log

          # Extract every SHA-256 certificate digest from apksigner output.
          # Format varies by build-tools version:
          #   build-tools <= 33: "Signer #1 certificate SHA-256 digest: AA:BB:..."
          #   build-tools >= 34: "V2 Signer: certificate SHA-256 digest: aabb..." (per APK signing scheme)
          # A single signing key can appear multiple times (once per signing
          # scheme V1/V2/V3/V4), and all of those entries should share the
          # same fingerprint. We grep all of them, normalise, and then insist
          # they are non-empty and unanimous — any divergence means either a
          # multi-signer APK or a build-tools/format regression.
          ACTUAL_LIST=$(grep -oE 'certificate SHA-256 digest:[[:space:]]+[0-9a-fA-F:]+' apksigner.log \
              | sed -E 's/^certificate SHA-256 digest:[[:space:]]+//' \
              | tr -d ':[:blank:]' \
              | tr '[:lower:]' '[:upper:]')
          if [ -z "$ACTUAL_LIST" ]; then
            echo "::error::Could not parse any SHA-256 certificate digest from apksigner output."
            exit 1
          fi
          UNIQUE_COUNT=$(echo "$ACTUAL_LIST" | sort -u | wc -l)
          if [ "$UNIQUE_COUNT" -ne 1 ]; then
            echo "::error::APK reports more than one distinct signer fingerprint — refusing to publish."
            echo "::error::Distinct SHA-256 values seen:"
            echo "$ACTUAL_LIST" | sort -u | sed 's/^/  /'
            exit 1
          fi
          ACTUAL_NORM=$(echo "$ACTUAL_LIST" | head -1)
          EXPECTED_NORM=$(head -1 fdroid/release-cert.sha256 | tr -d ':[:space:]' | tr '[:lower:]' '[:upper:]')

          # Guardrail: both values must be exactly 64 hex chars (SHA-256).
          if ! echo "$EXPECTED_NORM" | grep -qE '^[0-9A-F]{64}$'; then
            echo "::error::Expected fingerprint in fdroid/release-cert.sha256 is not a valid 64-char hex SHA-256."
            exit 1
          fi
          if ! echo "$ACTUAL_NORM" | grep -qE '^[0-9A-F]{64}$'; then
            echo "::error::Parsed signer fingerprint is not a valid 64-char hex SHA-256."
            exit 1
          fi

          echo "Expected SHA-256: $EXPECTED_NORM"
          echo "Actual   SHA-256: $ACTUAL_NORM"
          if [ "$ACTUAL_NORM" != "$EXPECTED_NORM" ]; then
            echo "::error::APK cert fingerprint does not match fdroid/release-cert.sha256."
            echo "::error::Either the wrong keystore secret was injected, or the signing key was rotated (requires a deliberate fingerprint update)."
            exit 1
          fi
          echo "Cert fingerprint verified: $ACTUAL_NORM"

      # --- Create release WITH APK attached atomically ---

      - name: Upload dry-run signed APK + apksigner log (non-main ref)
        if: always() && steps.check_commits.outputs.has_new_commits == 'true' && github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-signed-apk
          path: |
            cablesnap.apk
            cablesnap-fdroid.apk
            cablesnap-wear.apk
            apksigner.log
          if-no-files-found: warn
          retention-days: 14

      - name: Create GitHub Release with APK
        if: steps.check_commits.outputs.has_new_commits == 'true' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # All three artifacts are attached to the same GitHub Release:
          #   cablesnap.apk          — Play-flavor phone APK (canonical)
          #   cablesnap-fdroid.apk   — F-Droid-flavor phone APK (GMS-free)
          #   cablesnap-wear.apk     — Wear OS 4+ companion APK (Play-only)
          # The auto-fdroid workflow keys off cablesnap.apk presence to
          # decide whether to refresh the F-Droid repo; the actual F-Droid
          # repo build pulls cablesnap-fdroid.apk per
          # `.github/workflows/fdroid-release.yml`.
          VERSION="${{ steps.next_version.outputs.version }}"
          gh release create "v$VERSION" \
            cablesnap.apk \
            cablesnap-fdroid.apk \
            cablesnap-wear.apk \
            --title "v$VERSION" \
            --target main \
            --notes "${{ steps.release_notes.outputs.notes }}"
          echo "Released v$VERSION with phone (Play + F-Droid) and Wear OS APKs attached."
