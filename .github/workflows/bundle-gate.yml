name: Bundle Gate

# Production-hygiene gate: verifies the `__TEST_SCENARIO__` literal from the
# dev-only scenario seed hook never leaks into the exported web bundle.
#
# Guards the `if (__DEV__)` dead-code-elimination contract established in
# BLD-494 (see scripts/verify-scenario-hook-not-in-bundle.sh).
#
# Refs: BLD-494, BLD-495.

on:
  # Runs on every PR. The underlying script (~2 min) passes trivially when none
  # of the guarded paths have changed, so leaving it unfiltered is cheaper than
  # the operational cost of PRs being stuck in BLOCKED mergeStateStatus because
  # a required check never reported (BLD-525).
  pull_request: {}
  push:
    branches:
      - main
    paths:
      - 'lib/db/**'
      - 'hooks/**'
      - 'e2e/**'
      - 'assets/exercise-illustrations/**'
      - 'scripts/verify-scenario-hook-not-in-bundle.sh'
      - 'scripts/verify-exercise-illustrations-size.sh'
      - '.github/workflows/bundle-gate.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'app.config.ts'
      - 'metro.config.js'
      - 'babel.config.js'

# Cancel in-progress runs on new commits to the same PR to save CI minutes.
concurrency:
  group: bundle-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bundle-gate:
    name: Verify scenario hook not in production bundle
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run bundle gate
        run: bash scripts/verify-scenario-hook-not-in-bundle.sh

      - name: Verify exercise illustration bundle size (BLD-561)
        run: bash scripts/verify-exercise-illustrations-size.sh

      - name: Verify curation gate (BLD-743)
        # Deterministic safety-keyword discriminator over CURATION.md
        # sign-off blocks. Single source of truth for the gate logic is
        # scripts/curate-exercise-images.ts (gateBlocks); this CI step
        # imports that function via scripts/check-curation-gate.ts.
        # Skip when CURATION.md is absent (e.g., transient state on
        # branches before BLD-743 lands).
        run: |
          if [ -f assets/exercise-illustrations/CURATION.md ]; then
            npx tsx scripts/check-curation-gate.ts
          else
            echo "(no CURATION.md — skipping BLD-743 curation gate)"
          fi
