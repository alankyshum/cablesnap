name: Update F-Droid Repo

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.15.1)'
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: fdroid-release
  cancel-in-progress: false

jobs:
  update-fdroid:
    name: Update F-Droid Repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"
          echo "Downloading APK from release $TAG..."
          gh release download "$TAG" --pattern "cablesnap.apk" --output cablesnap.apk
          ls -la cablesnap.apk

      - name: Restore F-Droid keystore
        run: |
          echo "${{ secrets.FDROID_KEYSTORE }}" | base64 -d > fdroid/keystore.p12

      - name: Install fdroidserver
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv
          python3 -m venv /tmp/fdroid-venv
          /tmp/fdroid-venv/bin/pip install fdroidserver

      - name: Prepare F-Droid repo
        run: |
          cp cablesnap.apk fdroid/repo/
          rm -f fdroid/repo/.gitkeep
          cd fdroid
          /tmp/fdroid-venv/bin/fdroid update --create-metadata --rename-apks
        env:
          FDROID_KEY_STORE_PASS: ${{ secrets.FDROID_KEYSTORE_PASS }}

      - name: Clean up keystore
        if: always()
        run: rm -f fdroid/keystore.p12

      - uses: actions/upload-pages-artifact@v3
        with:
          path: fdroid

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: update-fdroid
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
