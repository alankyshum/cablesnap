# F-Droid build server build recipe.
#
# CableSnap is a managed Expo app — `android/` is generated by `expo prebuild`,
# not checked in. The recipe below runs the prebuild step, then asks Gradle to
# assemble the `releaseFdroid` build type (defined by
# `plugins/with-wearos-module.js`).
#
# Note: M0 BLD-736 originally used a `fdroidRelease` productFlavor; CEO
# approved a pivot to a `releaseFdroid initWith release` buildType on
# 2026-04-28 because Expo's autolinker propagates productFlavors into Expo
# subprojects, breaking expo-module-gradle-plugin's singleVariant `release`
# component publishing. BuildTypes are not propagated, so the split is
# `:app`-local. See `.plans/PLAN-BLD-716.md` Implementation Addendum for the
# full root cause.
#
# AC10b (per .plans/PLAN-BLD-716.md): the resulting APK MUST contain zero
# `com/google/android/gms/wearable/*` classes. The `with-wearos-module` plugin
# excludes the Wear bridge library project + the entire `com.google.android.gms`
# group from the releaseFdroid* configurations, and the F-Droid build server
# never installs Google Play Services on its build VMs anyway.
Builds:
  - versionName: 0.26.17
    versionCode: 70
    commit: v0.26.17
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y nodejs npm
    init: npm ci --ignore-scripts
    prebuild:
      - npx expo prebuild --platform android --no-install
    gradle:
      - releaseFdroid
    output: android/app/build/outputs/apk/releaseFdroid/app-releaseFdroid.apk
