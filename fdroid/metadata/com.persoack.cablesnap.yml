Name: CableSnap
AutoName: CableSnap
Summary: Workout tracker optimized for cable machines — supports all major exercises
Description: |
  CableSnap is a local-first fitness app optimized for cable machine workouts,
  with full support for barbell, dumbbell, bodyweight, and machine exercises.
  Track your workouts, nutrition, and body measurements. All data
  stays on your device.

  Features:
  - Workout logging with sets, reps, weight, and RPE
  - Exercise library with 100+ built-in exercises (cable, barbell, dumbbell, bodyweight)
  - Workout templates and multi-day programs
  - Nutrition tracking with macro targets
  - Progress charts and 1RM tracking
  - Body weight and measurements logging
  - Workout history with calendar view
  - Plate calculator and 1RM calculator
  - Interval timers (Tabata, EMOM, AMRAP)
  - Session rating (1-5 stars) on post-workout summary
  - Session notes — add text notes to completed workouts
  - CSV export and sharing
  - Dark mode support

